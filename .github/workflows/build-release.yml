name: Build and Release Xuper APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  # Forzamos Node24 según tu configuración original
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Añadido para acelerar builds futuros

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease assembleDebug

    - name: Prepare APK for Release
      run: |
        # Buscamos el APK de release generado
        RELEASE_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
        if [ -f "$RELEASE_APK" ]; then
          echo "APK de release encontrado en $RELEASE_APK"
          cp "$RELEASE_APK" xuper-v${{ github.event.inputs.version }}.apk
        else
          echo "Error: No se encontró el APK de release. Revisa el log de Gradle."
          exit 1
        fi

        # Buscamos el APK debug generado
        DEBUG_APK=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
        if [ -f "$DEBUG_APK" ]; then
          echo "APK debug encontrado en $DEBUG_APK"
          cp "$DEBUG_APK" xuper-v${{ github.event.inputs.version }}_debug.apk
        else
          echo "Warning: No se encontró el APK debug."
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Xuper v${{ github.event.inputs.version }}
        files: |
          xuper-v${{ github.event.inputs.version }}.apk
          xuper-v${{ github.event.inputs.version }}_debug.apk
        generate_release_notes: true
        draft: false
        prerelease: false
